services:
  - type: web
    name: battleship-api
    runtime: python
    repo: https://github.com/DhruvAjayToshniwal/Battleship
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./battleship.db
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.7"
